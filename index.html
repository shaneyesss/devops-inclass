<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Risk Score Web App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-bg"></div>
    <main class="app-shell">
        <header class="hero">
            <p class="eyebrow">Clinical Decision Support</p>
            <h1>Risk Score Calculator</h1>
            <p class="lead">
                Select a calculator, enter patient values, and compute a score instantly.
            </p>
        </header>

        <section class="panel controls">
            <label for="calculator-select" class="label">Risk calculator</label>
            <select id="calculator-select"></select>
            <p id="calculator-description" class="description"></p>
            <form id="calculator-form">
                <div id="dynamic-fields" class="field-grid"></div>
                <button type="submit" class="primary-btn">Calculate score</button>
            </form>
        </section>

        <section class="panel result-panel">
            <h2>Result</h2>
            <p id="result-status" class="result-status">Ready</p>
            <pre id="result-json">Select a calculator and submit values.</pre>
        </section>
    </main>

    <script>
        const calculators = {
            perc: {
                label: "PERC Rule",
                endpoint: "/api/perc",
                description: "Pulmonary Embolism Rule-Out Criteria for low pretest probability patients.",
                fields: [
                    { name: "age", label: "Age (years)", type: "number", step: "1" },
                    { name: "heart_rate", label: "Heart rate (bpm)", type: "number", step: "1" },
                    { name: "o2_sat", label: "O2 saturation (%)", type: "number", step: "0.1" },
                    { name: "hemoptysis", label: "Hemoptysis", type: "boolean" },
                    { name: "estrogen_use", label: "Estrogen use", type: "boolean" },
                    { name: "prior_dvt_pe", label: "Prior DVT/PE", type: "boolean" },
                    { name: "unilateral_leg_swelling", label: "Unilateral leg swelling", type: "boolean" },
                    { name: "surgery_trauma_4wks", label: "Recent surgery/trauma (4 weeks)", type: "boolean" }
                ]
            },
            heart: {
                label: "HEART Score",
                endpoint: "/api/heart",
                description: "MACE risk stratification for chest pain. Inputs are scored 0-2.",
                fields: [
                    {
                        name: "history",
                        label: "History",
                        type: "select",
                        options: [
                            { value: "0", text: "0 - Slightly suspicious" },
                            { value: "1", text: "1 - Moderately suspicious" },
                            { value: "2", text: "2 - Highly suspicious" }
                        ]
                    },
                    {
                        name: "ecg",
                        label: "ECG",
                        type: "select",
                        options: [
                            { value: "0", text: "0 - Normal" },
                            { value: "1", text: "1 - Non-specific disturbance" },
                            { value: "2", text: "2 - Significant ST deviation" }
                        ]
                    },
                    {
                        name: "age_score",
                        label: "Age score",
                        type: "select",
                        options: [
                            { value: "0", text: "0 - Age < 45" },
                            { value: "1", text: "1 - Age 45-64" },
                            { value: "2", text: "2 - Age >= 65" }
                        ]
                    },
                    {
                        name: "risk_factors",
                        label: "Risk factors",
                        type: "select",
                        options: [
                            { value: "0", text: "0 - None" },
                            { value: "1", text: "1 - One to two" },
                            { value: "2", text: "2 - Three or more / known disease" }
                        ]
                    },
                    {
                        name: "troponin",
                        label: "Troponin",
                        type: "select",
                        options: [
                            { value: "0", text: "0 - <= normal" },
                            { value: "1", text: "1 - 1x to 3x" },
                            { value: "2", text: "2 - > 3x" }
                        ]
                    }
                ]
            },
            chads_vasc: {
                label: "CHA2DS2-VASc",
                endpoint: "/api/chads_vasc",
                description: "Atrial fibrillation stroke risk score for anticoagulation guidance.",
                fields: [
                    { name: "chf", label: "Congestive heart failure", type: "boolean" },
                    { name: "hypertension", label: "Hypertension", type: "boolean" },
                    { name: "age", label: "Age (years)", type: "number", step: "1" },
                    { name: "diabetes", label: "Diabetes mellitus", type: "boolean" },
                    { name: "stroke_tia", label: "Prior stroke/TIA", type: "boolean" },
                    { name: "vascular_disease", label: "Vascular disease", type: "boolean" },
                    {
                        name: "sex",
                        label: "Sex",
                        type: "select",
                        options: [
                            { value: "male", text: "Male" },
                            { value: "female", text: "Female" }
                        ]
                    }
                ]
            },
            ascvd: {
                label: "ASCVD 10-Year Risk",
                endpoint: "/api/ascvd",
                description: "ACC/AHA pooled cohort equation for 10-year cardiovascular risk.",
                fields: [
                    { name: "age", label: "Age (years)", type: "number", step: "1" },
                    {
                        name: "sex",
                        label: "Sex",
                        type: "select",
                        options: [
                            { value: "male", text: "Male" },
                            { value: "female", text: "Female" }
                        ]
                    },
                    {
                        name: "race",
                        label: "Race",
                        type: "select",
                        options: [
                            { value: "white", text: "White" },
                            { value: "aa", text: "African American" }
                        ]
                    },
                    { name: "total_cholesterol", label: "Total cholesterol (mg/dL)", type: "number", step: "0.1" },
                    { name: "hdl_cholesterol", label: "HDL cholesterol (mg/dL)", type: "number", step: "0.1" },
                    { name: "systolic_bp", label: "Systolic blood pressure (mmHg)", type: "number", step: "0.1" },
                    { name: "bp_treated", label: "On BP treatment", type: "boolean" },
                    { name: "diabetes", label: "Diabetes mellitus", type: "boolean" },
                    { name: "smoker", label: "Current smoker", type: "boolean" }
                ]
            },
            pecarn: {
                label: "PECARN Head Injury",
                endpoint: "/api/pecarn",
                description: "Pediatric head injury decision rule for CT guidance.",
                fields: [
                    { name: "age_months", label: "Age (months)", type: "number", step: "1" },
                    { name: "gcs", label: "GCS", type: "number", step: "1" },
                    { name: "altered_mental_status", label: "Altered mental status", type: "boolean" },
                    { name: "loss_of_consciousness", label: "Loss of consciousness", type: "boolean" },
                    { name: "palpable_skull_fracture", label: "Palpable skull fracture", type: "boolean" },
                    {
                        name: "scalp_hematoma_location",
                        label: "Scalp hematoma location",
                        type: "select",
                        options: [
                            { value: "none", text: "None" },
                            { value: "frontal", text: "Frontal" },
                            { value: "non-frontal", text: "Non-frontal" }
                        ]
                    },
                    { name: "severe_mechanism", label: "Severe mechanism", type: "boolean" },
                    { name: "vomiting", label: "Vomiting", type: "boolean" },
                    { name: "severe_headache", label: "Severe headache", type: "boolean" },
                    { name: "signs_basal_skull_fracture", label: "Signs of basilar skull fracture", type: "boolean" }
                ]
            }
        };

        const calculatorSelect = document.getElementById("calculator-select");
        const calculatorDescription = document.getElementById("calculator-description");
        const fieldsContainer = document.getElementById("dynamic-fields");
        const form = document.getElementById("calculator-form");
        const resultJson = document.getElementById("result-json");
        const resultStatus = document.getElementById("result-status");

        function buildBooleanField(field) {
            const wrapper = document.createElement("label");
            wrapper.className = "field";

            const text = document.createElement("span");
            text.textContent = field.label;

            const input = document.createElement("select");
            input.name = field.name;
            input.required = true;

            const falseOpt = new Option("No", "false");
            const trueOpt = new Option("Yes", "true");

            input.append(falseOpt, trueOpt);
            wrapper.append(text, input);
            return wrapper;
        }

        function buildField(field) {
            if (field.type === "boolean") {
                return buildBooleanField(field);
            }

            const wrapper = document.createElement("label");
            wrapper.className = "field";

            const text = document.createElement("span");
            text.textContent = field.label;

            let input;
            if (field.type === "select") {
                input = document.createElement("select");
                field.options.forEach((opt) => {
                    input.add(new Option(opt.text, opt.value));
                });
            } else {
                input = document.createElement("input");
                input.type = "number";
                input.step = field.step || "1";
                input.inputMode = "decimal";
            }

            input.name = field.name;
            input.required = true;
            wrapper.append(text, input);
            return wrapper;
        }

        function renderFields(calculatorKey) {
            const calculator = calculators[calculatorKey];
            calculatorDescription.textContent = calculator.description;
            fieldsContainer.innerHTML = "";
            calculator.fields.forEach((field) => {
                fieldsContainer.appendChild(buildField(field));
            });
        }

        function parseValue(field, rawValue) {
            if (field.type === "boolean") {
                return rawValue === "true";
            }
            if (field.type === "number") {
                return field.step === "1" ? parseInt(rawValue, 10) : parseFloat(rawValue);
            }
            if (field.type === "select") {
                if (field.options.every((opt) => opt.value === "0" || opt.value === "1" || opt.value === "2")) {
                    return parseInt(rawValue, 10);
                }
                return rawValue;
            }
            return rawValue;
        }

        function populateCalculatorSelect() {
            Object.keys(calculators).forEach((key) => {
                const option = new Option(calculators[key].label, key);
                calculatorSelect.add(option);
            });
            renderFields(calculatorSelect.value);
        }

        calculatorSelect.addEventListener("change", (event) => {
            renderFields(event.target.value);
            resultStatus.textContent = "Ready";
            resultJson.textContent = "Select a calculator and submit values.";
        });

        form.addEventListener("submit", async (event) => {
            event.preventDefault();

            const key = calculatorSelect.value;
            const calculator = calculators[key];
            const payload = {};

            calculator.fields.forEach((field) => {
                const rawValue = form.elements[field.name].value;
                payload[field.name] = parseValue(field, rawValue);
            });

            resultStatus.textContent = "Calculating...";
            resultJson.textContent = JSON.stringify(payload, null, 2);

            try {
                const response = await fetch(calculator.endpoint, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if (!response.ok) {
                    resultStatus.textContent = "Request error";
                    resultJson.textContent = JSON.stringify(data, null, 2);
                    return;
                }

                resultStatus.textContent = "Success";
                resultJson.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                resultStatus.textContent = "Network error";
                resultJson.textContent = JSON.stringify({ error: String(error) }, null, 2);
            }
        });

        populateCalculatorSelect();
    </script>
</body>
</html>
